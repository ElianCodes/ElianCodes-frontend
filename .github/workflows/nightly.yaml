name: nightly

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nightly-upgrade
  cancel-in-progress: true

jobs:
  upgrade:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max_old_space_size=4096"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Upgrade Astro
        run: pnpm dlx @astrojs/upgrade --yes

      - name: Refresh dependencies after upgrade
        run: pnpm install --no-frozen-lockfile

      - name: Run Biome checks
        run: pnpm check

      - name: Build site
        run: pnpm build

      - name: PR Changes
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ci/update-astro
          commit-message: "chore: ci: update Astro"
          assignees: eliancodes
          title: "chore: ci: update Astro"
          body: Update Astro and packages to latest version
          labels: ci
